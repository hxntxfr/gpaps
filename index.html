<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Твоя игра</title>
    </head>
    <body>
        <dialog id="fs">
            <div onclick="this.parentElement.close();"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"><path fill="currentColor" d="M19.376 12.416L8.777 19.482A.5.5 0 0 1 8 19.066V4.934a.5.5 0 0 1 .777-.416l10.599 7.066a.5.5 0 0 1 0 .832"/></svg></div>
        </dialog>
        <div id="sc">
            <div id="page_select">
                <div class="flex">
                    <div class="table-names">
                        <div class="name n1">Цветы и растения</div>
                        <div class="name n2">Женские имена и героини</div>
                        <div class="name n3">Мода и стиль</div>
                        <div class="name n4">Праздники и традиции</div>
                    </div>
                    <div class="table-grid">
                        <div class="btn" answer="Подснежник" did="0" question="Что за цветок, согласно легенде, вырос из капель крови прикованного Прометея и часто дарится на праздники?" onclick="solve(this)">100</div>
                    <div class="btn" answer="Гладиолус" did="0" question="Название этого цветка в переводе с латыни означает «меч», а на языке цветов он символизирует гордость и дружбу." onclick="solve(this)">200</div>
                    <div class="btn" answer="Лилия" did="0" question="Какой цветок, символ чистоты и непорочности, держит в руках невеста на свадьбе?" onclick="solve(this)">300</div>
                    <div class="btn" answer="Калипсо" did="0" question="Эти цветы названы в честь прекрасной нимфы, в которую был влюблен Одиссей. Согласно мифам, она отвергла его, спрятавшись в пещере, и Одиссей нашел там только это прекрасное растение." onclick="solve(this)">500</div>

                        <div class="btn" answer="Дюймовочка" did="1" question="Как звали самую маленькую девочку, родившуюся в цветке?" onclick="solve(this)">100</div>
                    <div class="btn" answer="Спящая красавица" did="1" question="Какая принцесса уколола палец веретеном и уснула на 100 лет из-за проклятия злой феи?" onclick="solve(this)">200</div>
                    <div class="btn" answer="Золушка" did="1" question="Имя этой девушки стало символом домашнего труда и золушек, работающих на кухне, а ее главным украшением были доброта и скромность." onclick="solve(this)">300</div>
                    <div class="btn" answer="Фрейя" did="1" question="Эта героиня скандинавского эпоса, одалживая свое волшебное ожерелье Брисингамен, была прекраснейшей из богинь, но из-за своей гордыни стала причиной раздора между героями." onclick="solve(this)">500</div>

                        <div class="btn" answer="Колготки" did="2" question="Легкая, воздушная, часто капроновая деталь женского гардероба, которая появилась в 1938 году и сразу стала популярной." onclick="solve(this)">100</div>
                    <div class="btn" answer="Зонт" did="2" question="Как называется аксессуар, который весной спасает от моросящего дождя, а летом — от палящего солнца, но главное его предназначение — дополнять образ?" onclick="solve(this)">200</div>
                    <div class="btn" answer="Бусы" did="2" question="Это украшение из нитей и бисера, которое носят на шее. Оно может быть колье или просто ниткой жемчуга." onclick="solve(this)">300</div>
                    <div class="btn" answer="Пояс" did="2" question="Элемент одежды, который носят на талии. В старину на Руси это был обязательный атрибут женского костюма, а сегодня это просто стильный аксессуар." onclick="solve(this)">500</div>

                        <div class="btn" answer="Германия" did="3" question="В какой стране впервые отметили Международный женский день 8 марта 1914 года?" onclick="solve(this)">100</div>
                    <div class="btn" answer="День победы трудящихся женщин" did="3" question="В Советском Союзе 8 марта стал выходным днем только в 1965 году. Какую дату официально учредил этот день?" onclick="solve(this)">200</div>
                    <div class="btn" answer="Азербайджан" did="3" question="В какой стране 8 марта отмечают не только как День женщин, но и как День матери?" onclick="solve(this)">300</div>
                    <div class="btn" answer="Сладости" did="3" question="Традиционный подарок на 8 марта в Японии — это не цветы, а... Что?" onclick="solve(this)">500</div>
                    </div>
                </div>
            </div>
        </div>

        <dialog id="win">
            <div id="win_question"></div>
            <div id="win_answer"></div>
        </dialog>
        <div id="fsbtn" onclick="enterFullscreen(document.querySelector('body'))">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M7 14H5v5h5v-2H7zm-2-4h2V7h3V5H5zm12 7h-3v2h5v-5h-2zM14 5v2h3v3h2V5z"/></svg>
        </div>
    </body>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        :root {
            --amb: #e8ca91;
        }
        body {
            background-image: radial-gradient(#0007a9, #01024e);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: "Oswald", 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif, system-ui;
            margin: 0;
            color: var(--amb);
            font-size: 60px;
            text-shadow: 0px 4px 8px rgb(232, 202, 145, 0.2);
            font-weight: 600;
            user-select: none;
        }
        #page_select {
            width: 100vw;
            height: 100vh;
        }
        .flex {
            display: flex;
            height: 100vh;
        }
        #sc {
            
            background-image: radial-gradient(#0007a9, #01024e);
        }
        .table-names {
            grid-template-rows: repeat(4, 1fr);
            display: grid;
            border-right: 1px solid white;            
            width: -webkit-fill-available;
        }
        .table-names .name {
            display: flex;
            border-bottom: 1px solid white;
            justify-content: center;
            align-items: center;
        }
        .table-grid {
            display: grid;
            
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
        }
        .table-grid .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid white; 
            border-right: 1px solid white; 
        }
        @keyframes blink {
            0% { background: var(--amb); color: black; }
            2% { background: var(--amb); color: black; }
            3% { background: transparent; color: var(--amb); }
            5% { background: transparent; color: var(--amb); }
            6% { background: var(--amb); color: black; }
            8% { background: var(--amb); color: black; }
            9% { background: transparent; color: var(--amb); }
            11% { background: transparent; color: var(--amb); }
            12% { background: var(--amb); color: black; }
            14% { background: var(--amb); color: black; }
            15% { background: transparent; color: var(--amb); }
            17% { background: transparent; color: var(--amb); }
            18% { background: var(--amb); color: black; }
            100% { background: var(--amb); color: black; }
        }
        #win, #fs {
            background: transparent;
            overflow: hidden;
            height: 100vh;
            background: radial-gradient(#0007a9, #01024e);
            width: 100vw;
            font-family: "Oswald", 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif, system-ui;
            margin: 0;
            color: var(--amb);
            font-size: 60px;
            text-shadow: 0px 4px 8px rgb(232, 202, 145, 0.2);
            font-weight: 600;
            user-select: none;
            justify-content: center;
            align-items: center;
            padding: 0;
            display: flex;
            border: 0;
            outline: none;
        }
        dialog:not([open]) {
            display: none!important;
        }
        #win_question {
            text-align: center;
        }
        #win #window_answer {
            display: none;
        }
        #fsbtn {
            bottom: 1px;
            opacity: 0.5;
            padding: 8px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            display: flex;
            position: absolute;
            z-index: 4000;
            border-radius: 50%;
            left: 1px;
        }
    </style>

    <script>
        function enterFullscreen(element) {
            if (element.requestFullscreen) {
                element.requestFullscreen();
            } else if (element.webkitRequestFullscreen) { /* Safari */
                element.webkitRequestFullscreen();
            } else if (element.msRequestFullscreen) { /* IE/Edge */
                element.msRequestFullscreen();
            }
            setTimeout(function() {
                resize();
            }, 100);
        }
        fs.show();
        
        const solved = [0, 0, 0, 0];
        function solve(th) {
            if (!th.hasAttribute('onclick')) return;
            th.style.animation = "blink 5s";
            setTimeout(function() {
                page_select.style.display = "none";
                win_answer.style.display = "none";
                th.innerText = ""; // permanently
                th.setAttribute('onclick', "");
                th.style.animation = "none";
                win_question.style.display = "block";

                win_question.innerText = th.getAttribute("question");
                win_answer.innerText = th.getAttribute("answer");
                win.show();
                win.onclick = function() {
                    win_question.style.display = "none";
                    win_answer.style.display = "block";

                    win.onclick = function() {
                        win_question.style.display = "none";
                        win_answer.style.display = "none";
                        
                        page_select.style.display = "block";
                        win.onclick = null;

                        const did = Number(th.getAttribute('did'));
                        solved[did] = solved[did]+1;
                    }
                }
            }, 1200);
            
        }

        function $(e) { return document.querySelector(e) }

        setInterval(function() {
            if (solved[0] == 4) {
                $('.n1').innerText = "";
                $('.n1').classList.add('solved');
            }
            if (solved[1] == 4) {
                $('.n2').innerText = "";
                $('.n2').classList.add('solved');
            }
            if (solved[2] == 4) {
                $('.n3').innerText = "";
                $('.n3').classList.add('solved');
            }
            if (solved[3] == 4) {
                $('.n4').innerText = "";
                $('.n4').classList.add('solved');
            }
        }, 500);

        function resize() {
            const grid = document.querySelector('.table-grid');
            grid.style['min-width'] = grid.clientHeight + 'px';
        } resize();
    </script>

</html>
